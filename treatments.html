      if (!data) return;
      var optionsHtml = data.options.map(function (opt) {
        return '<div class="rx-option">' +
                 '<div>' +
                   '<div class="rx-option__name">' + opt.name + '</div>' +
                   '<div class="rx-option__duration">' + opt.duration + '</div>' +
                 '</div>' +
                 '<div class="rx-option__price">' + opt.price + '</div>' +
               '</div>';
      }).join('');

      document.getElementById('rxModalBody').innerHTML =
        '<div class="rx-modal__head">' +
          '<div class="rx-modal__icon"><img src="' + data.icon + '" alt="' + data.title + '"></div>' +
          '<div class="rx-modal__title">' +
            '<h2 id="rxModalTitle">' + data.title + '</h2>' +
            '<p class="price">' + data.price + '</p>' +
          '</div>' +
        '</div>' +
        '<p class="rx-modal__desc">' + data.description + '</p>' +
        '<div class="rx-modal__options">' +
          '<p class="rx-modal__options-label">Pricing</p>' +
          optionsHtml +
        '</div>' +
        '<a href="https://portal.aestheticnursesoftware.com/book-online/30956" class="btn btn-dark rx-modal__cta" target="_blank" rel="noopener noreferrer">Book this treatment</a>';

      document.getElementById('rxModalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeTreatmentModal(event, force) {
      if (force || !event || event.target === document.getElementById('rxModalOverlay')) {
        document.getElementById('rxModalOverlay').classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        var overlay = document.getElementById('rxModalOverlay');
        if (overlay && overlay.classList.contains('active')) {
          overlay.classList.remove('active');
          document.body.style.overflow = '';
        }
      }
    });
  </script>
</body>
</html>
