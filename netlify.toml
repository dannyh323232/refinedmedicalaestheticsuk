[build]
  # No build command — the HTML is deployed as-is from the repo root
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = true

[build.processing.js]
  bundle = false
  minify = true

[build.processing.images]
  compress = true

[build.processing.html]
  pretty_urls = true
